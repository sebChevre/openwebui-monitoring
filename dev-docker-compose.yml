services:
  ollama-proxy:
    build:
      context: ../ollama-proxy
      dockerfile: Dockerfile
    container_name: ollama-proxy
    ports:
      - "11435:11435"
    environment:
      PROXY_PORT: 11435
      OLLAMA_HOST: host.docker.internal
      OLLAMA_PORT: 11434
      MONITOR_URL: http://ollama-monitoring:3333
      LOG_FILE: /data/proxy-log.json
    volumes:
      - proxy-data:/data
    depends_on:
      - ollama-monitoring
    networks:
      - ollama-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-monitoring:
    build:
      context: ../ollama-monitoring
      dockerfile: Dockerfile
    container_name: ollama-monitoring
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      DATA_DIR: /data
    volumes:
      - monitoring-data:/data
    networks:
      - ollama-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  open-webui:
    build:
      context: .
      dockerfile: ./Dockerfile.monitoring
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: open-webui
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama-proxy:11435
      WEBUI_SECRET_KEY: dev-secret-key-change-in-production
      LOG_LEVEL: INFO
    volumes:
      - webui-data:/app/backend/data
    depends_on:
      - ollama-proxy
      - ollama-monitoring
    networks:
      - ollama-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  proxy-data:
    driver: local
  monitoring-data:
    driver: local
  webui-data:
    driver: local

networks:
  ollama-network:
    driver: bridge
